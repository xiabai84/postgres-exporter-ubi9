name: Build and Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  POSTGRES_EXPORTER_VERSION: "0.19.1"

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download source
        run: ./scripts/download-source.sh --version ${{ env.POSTGRES_EXPORTER_VERSION }}

      - name: Vendor dependencies
        run: ./scripts/vendor-deps.sh

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/${{ matrix.arch }}
          build-args: |
            POSTGRES_EXPORTER_VERSION=${{ env.POSTGRES_EXPORTER_VERSION }}
            TARGETARCH=${{ matrix.arch }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

  create-manifest:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          TAG="${{ github.ref_name }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          IMAGE_LC="${IMAGE,,}"

          docker manifest create "${IMAGE_LC}:${TAG}" \
            "${IMAGE_LC}:${TAG}-amd64" \
            "${IMAGE_LC}:${TAG}-arm64"

          docker manifest annotate "${IMAGE_LC}:${TAG}" \
            "${IMAGE_LC}:${TAG}-amd64" --arch amd64
          docker manifest annotate "${IMAGE_LC}:${TAG}" \
            "${IMAGE_LC}:${TAG}-arm64" --arch arm64

          docker manifest push "${IMAGE_LC}:${TAG}"

          docker manifest create "${IMAGE_LC}:latest" \
            "${IMAGE_LC}:${TAG}-amd64" \
            "${IMAGE_LC}:${TAG}-arm64"
          docker manifest push "${IMAGE_LC}:latest"

  release:
    needs: create-manifest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## postgres_exporter ${{ env.POSTGRES_EXPORTER_VERSION }} on UBI9

            ### Pull the image
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ```

            ### Architectures
            - `linux/amd64`
            - `linux/arm64`
